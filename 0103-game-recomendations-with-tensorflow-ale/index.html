<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Recommendation System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body data-theme="dark">
    <div class="main">
      <div class="topbar">
        <div>
          <h1 class="title-glow">Game Recommendation System</h1>
          <p class="subtitle">Neural recommendations tuned for each player</p>
        </div>
        <button
          id="themeToggleBtn"
          class="btn btn-outline-light theme-toggle-btn"
        >
          <i class="bi bi-moon-stars-fill"></i>
          <span>Dark</span>
        </button>
      </div>

      <div class="row mt-3">
        <div class="col-md-4">
          <div class="card panel-card mb-4">
            <div class="card-header">
              <h4>User Profile</h4>
            </div>
            <div class="card-body">
              <form id="userForm">
                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label for="userSelect" class="form-label"
                      >Select User</label
                    >
                    <select class="form-select" id="userSelect">
                      <option value="">-- Select a user --</option>
                    </select>
                  </div>

                  <div class="col-md-6 mb-3">
                    <label for="userAge" class="form-label">Age</label>
                    <input
                      type="number"
                      class="form-control"
                      id="userAge"
                      disabled
                    />
                  </div>
                </div>
              </form>

              <div id="pastGamesContainer" class="mt-4">
                <h5>Past Played Games</h5>
                <div id="pastGamesList" class="row"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card panel-card mb-4">
            <div class="card-header">
              <h4>Model Training</h4>
            </div>
            <div class="card-body">
              <div class="row">
                <div class="model-controls d-flex gap-2">
                  <button
                    id="trainModelBtn"
                    class="btn btn-primary train-model-btn"
                  >
                    <i class="bi bi-cpu"></i> Train Model
                  </button>
                  <button
                    disabled
                    id="runRecommendationBtn"
                    class="btn btn-success train-model-btn"
                  >
                    <i class="bi bi-cpu"></i> Run Recommendation
                  </button>
                </div>
              </div>

              <div class="all-users-games">
                <h5 id="gamesDiv" style="cursor: pointer">
                  All Users Games Data
                  <i id="gamesArrow" class="bi bi-chevron-down"></i>
                </h5>
                <div
                  id="allUsersGamesList"
                  class="user-games-data overflow-auto"
                  style="max-height: 400px; display: none"
                ></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <h3 class="">Games</h3>
      <div class="row" id="gameList"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis@1.5.1/dist/tfjs-vis.umd.min.js"></script>
    <script>
      (() => {
        const body = document.body;
        const toggleBtn = document.getElementById("themeToggleBtn");
        const savedTheme = localStorage.getItem("aleia-theme");
        const prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;

        const setTheme = (theme) => {
          body.dataset.theme = theme;
          localStorage.setItem("aleia-theme", theme);

          const isDark = theme === "dark";
          toggleBtn.className = `btn theme-toggle-btn ${isDark ? "btn-outline-light" : "btn-outline-dark"}`;
          toggleBtn.innerHTML = isDark
            ? '<i class="bi bi-moon-stars-fill"></i><span>Dark</span>'
            : '<i class="bi bi-sun-fill"></i><span>Light</span>';
        };

        setTheme(savedTheme || (prefersDark ? "dark" : "light"));

        toggleBtn.addEventListener("click", () => {
          const nextTheme = body.dataset.theme === "dark" ? "light" : "dark";
          setTheme(nextTheme);
        });
      })();
    </script>
    <script type="module" src="./src/index.js"></script>
  </body>
</html>
