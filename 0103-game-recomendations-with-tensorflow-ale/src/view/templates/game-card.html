<div class="col-md-3">
  <div class="card game-card">
    <div class="card-body">
      <h5 class="card-title">{{name}}</h5>
      <h6 class="card-subtitle mb-2 text-muted">
        {{category}} - {{metacritic}} (Metacritic)
      </h6>
      <p class="card-text">
        <strong>Score:</strong> {{score}}<br />
        <small class="text-muted">{{reason}}</small>
      </p>
      <button class="btn btn-primary play-now-btn" data-game="{{game}}">
        Play Now
      </button>
    </div>
  </div>
</div>
